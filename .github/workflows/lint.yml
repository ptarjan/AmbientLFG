name: Lint

on: [push, pull_request]

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lunarmodules/luacheck@v1

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1 (WoW's Lua version)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lua5.1
      - run: lua5.1 tests/run.lua
